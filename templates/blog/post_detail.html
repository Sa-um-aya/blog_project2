{% extends 'blog/base.html' %}
{% block content %}

<div class="card shadow p-4">
    <h2>{{ post.title }}</h2>
    <p class="text-muted">By {{ post.author }} | {{ post.created_at }}</p>

    {% if post.image %}
    <img src="{{ post.image.url }}" class="img-fluid mb-3">
    {% endif %}

    <p>{{ post.content }}</p>
</div>

{% endblock %}
