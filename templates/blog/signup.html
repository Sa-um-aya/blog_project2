{% extends 'blog/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <h3 class="text-center mb-3">Signup❤️</h3>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button class="btn btn-primary w-100">Signup🫥</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
